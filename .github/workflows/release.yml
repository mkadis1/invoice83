name: Release and Package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Tester ZIP
        shell: pwsh
        run: |
          ./pakiranje.ps1
          # Note: pakiranje.ps1 currently uses an absolute path for zipPath.
          # We should update it to use a relative path if possible.

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Invoice83_tester.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
